1   
2   #user nobody;
3   worker_processes 1;   # Строка 3: Количество воркер-процессов NGINX (установлено 1)
4   
5   #error_log logs/error.log;
6   #error_log logs/error.log notice;
7   #error_log logs/error.log info;
8   
9   pid /home/runner/workspace/logs/nginx.pid;   # Строка 9: Путь к файлу с PID главного процесса
10  
11  
12  events {   # Строка 12: Начало блока events - настройка обработки соединений
13      worker_connections 1024;
14  }   # Строка 14: Закрывающая скобка блока events
15  
16  
17  http {   # Строка 17: Начало блока http - основная секция конфигурации веб-сервера
18      include mime.types;   # Строка 18: Подключает файл mime.types с MIME-типами
19      default_type application/octet-stream;   # Строка 19: MIME-тип по умолчанию (двоичный поток)
20  
21      #log_format main '$remote_addr - $remote_user [$time_local] "$request"
22      #                 '$status $body_bytes_sent "$http_referer"
23  
24  
25      access_log /home/runner/workspace/logs/access.log;
26  
27      sendfile on;
28      #tcp_nopush on;
29  
30      #keepalive_timeout 0;
31      keepalive_timeout 65;
32  
33      #gzip on;
34  
35      server {   # Строка 35: Начало блока server - конфигурация виртуального сервера
36          listen 8080;   # Строка 36: Прослушивание порта 8080
37          server_name localhost;   # Строка 37: Имя виртуального сервера (localhost)
38  
39          #charset koi8-r;
40  
41          #access_log logs/host.access.log main;
42  
43          location / {   # Строка 43: Блок location для обработки корневого пути
44              proxy_pass http://127.0.0.1:8181;   # Строка 44: Проксирование запросов на 127.0.0.1:8181
45  
46  
47          #error_page 404 /404.html;
48  
49          #redirect server error pages to the static page /50x.html
50  
51          error_page 500 502 503 504 /50x.html;   # Строка 51: Страница для ошибок 500,502,503,504
52          location = /50x.html {   # Строка 52: Блок location для точного совпадения /50x.html
53              root html;   # Строка 53: Корневая директория для поиска файла
54  
55  
56          }
57      }
58  }
